services:
  postgres:
    image: postgres:15-alpine
    container_name: facebook-monitor-postgres
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d facebook_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: facebook-monitor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: facebook-monitor-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    volumes:
      - ./logs:/app/logs

  # MIGRATION: Celery Beat scheduler thay cho manual scheduler
  scheduler:
    build: .
    container_name: facebook-monitor-scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    volumes:
      - ./logs:/app/logs
    # CHANGED: Celery Beat command thay cho python scan_scheduler.py
    command: ["celery", "-A", "multi_queue_worker", "beat", "--loglevel=info"]
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.Redis(host='redis', port=6379); r.ping(); print('Beat OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # MIGRATION: Celery worker thay cho manual MultiQueueWorker
  worker:
    build: .
    container_name: facebook-monitor-worker
    restart: unless-stopped
    depends_on:
      - scheduler
    env_file:
      - ./.env
    volumes:
      - ./logs:/app/logs
      - ./sessions:/app/sessions
      - ./proxies.txt:/app/proxies.txt
      - ./targets.json:/app/targets.json
      - ./auto_login.py:/app/auto_login.py:ro
      - ./account.txt:/app/account.txt:ro
    # CHANGED: Celery worker command với priority queues
    # Concurrency increased to 3 for better throughput (adjust based on available sessions/proxies)
    command: ["celery", "-A", "multi_queue_worker", "worker", "--loglevel=info", "--queues=scan_high,scan_normal,discovery,maintenance", "--concurrency=3"]
    healthcheck:
      test: ["CMD", "python", "-c", "from multi_queue_worker import health_check; print('Worker OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ADDED: Flower monitoring UI
  flower:
    build: .
    container_name: facebook-monitor-flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    depends_on:
      - redis
    env_file:
      - ./.env
    command: ["celery", "-A", "multi_queue_worker", "flower", "--port=5555"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/", "||", "exit", "1"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 60s

  streamlit:
    build: .
    container_name: facebook-monitor-streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    depends_on:
      - api
    env_file:
      - ./.env
    volumes:
      - ./logs:/app/logs
      - ./targets.json:/app/targets.json
    command: ["streamlit", "run", "webapp_streamlit/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/", "||", "exit", "1"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 90s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
