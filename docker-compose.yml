services:
  postgres:
    image: postgres:15-alpine
    container_name: facebook-monitor-postgres
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d facebook_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: facebook-monitor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: facebook-monitor-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    volumes:
      - ./logs:/app/logs
      - ./core:/app/core
      - ./utils:/app/utils
      - ./config.py:/app/config.py:ro
      - ./targets.json:/app/targets.json:ro

  # MIGRATION: Celery Beat scheduler thay cho manual scheduler
  scheduler:
    build: .
    container_name: facebook-monitor-scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    volumes:
      - ./logs:/app/logs
      - ./core:/app/core
      - ./utils:/app/utils
      - ./config.py:/app/config.py:ro
      - ./targets.json:/app/targets.json:ro
    # CHANGED: Celery Beat command thay cho python scan_scheduler.py
    command: ["celery", "-A", "multi_queue_worker", "beat", "--loglevel=info"]
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.Redis(host='redis', port=6379); r.ping(); print('Beat OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # MIGRATION: Celery worker thay cho manual MultiQueueWorker
  worker:
    build: .
    container_name: facebook-monitor-worker
    restart: unless-stopped
    depends_on:
      - scheduler
    env_file:
      - ./.env
    environment:
      - DOCKER_ENV=true
      # Worker concurrency will be auto-detected from session count
      # Override with WORKER_CONCURRENCY if needed
    volumes:
      - ./logs:/app/logs
      - ./sessions:/app/sessions
      - ./proxies.txt:/app/proxies.txt
      - ./targets.json:/app/targets.json
      - ./auto_login.py:/app/auto_login.py:ro
      - ./account.txt:/app/account.txt:ro
      - ./core:/app/core
      - ./utils:/app/utils
      - ./scrapers:/app/scrapers
      - ./config.py:/app/config.py:ro
      - ./selectors.json:/app/selectors.json:ro
      - ./screenshots:/app/screenshots
    # Auto-login + Worker startup
    command: >
      sh -c 'echo "🚀 Worker initialization starting..." &&
             echo "Step 1: Kill all orphaned Chrome processes..." &&
             pkill -9 chromium || true &&
             pkill -9 chrome || true &&
             sleep 2 &&
             echo "Step 2: Cleaning session locks and stale files..." &&
             find ./sessions -name "SingletonLock" -type f -delete 2>/dev/null || true &&
             find ./sessions -name "SingletonCookie" -type f -delete 2>/dev/null || true &&
             find ./sessions -name "SingletonSocket" -type f -delete 2>/dev/null || true &&
             find ./sessions -name ".lock" -type f -delete 2>/dev/null || true &&
             find ./sessions -name "lockfile" -type f -delete 2>/dev/null || true &&
             rm -f proxy_status.json session_proxy_bindings.json 2>/dev/null || true &&
             echo "✅ Session locks and orphaned processes cleaned" &&
             echo "Step 3: Auto-login all accounts (skip existing)..." &&
             python auto_login.py account.txt all true true &&
             echo "✅ Auto-login completed successfully" &&
             echo "Step 3.5: Kill all Chrome processes from auto_login..." &&
             pkill -9 chromium || true &&
             pkill -9 chrome || true &&
             sleep 2 &&
             find ./sessions -name "SingletonLock" -type f -delete 2>/dev/null || true &&
             find ./sessions -name "SingletonCookie" -type f -delete 2>/dev/null || true &&
             find ./sessions -name "SingletonSocket" -type f -delete 2>/dev/null || true &&
             echo "✅ Auto-login Chrome processes killed and locks cleaned" &&
             echo "Step 4: Reset sessions/proxies and count for dynamic concurrency..." &&
             python reset_sessions.py 2>/dev/null || echo "⚠️ reset_sessions.py failed, continuing..." &&
             SESSION_COUNT=$$(python -c "import json; data=json.load(open(\"session_status.json\")); print(sum(1 for s in data.values() if s.get(\"status\")==\"READY\"))" 2>/dev/null || echo 2) &&
             CONCURRENCY=$${WORKER_CONCURRENCY:-$$SESSION_COUNT} &&
             echo "🔧 Worker concurrency: $$CONCURRENCY (sessions available: $$SESSION_COUNT, dynamic scaling enabled)" &&
             echo "Step 5: Starting periodic cleanup (every 2 minutes)..." &&
             (while true; do sleep 120; find ./sessions -name "SingletonLock" -type f -delete 2>/dev/null || true; find ./sessions -name "SingletonCookie" -type f -delete 2>/dev/null || true; find ./sessions -name "SingletonSocket" -type f -delete 2>/dev/null || true; find ./sessions -name ".lock" -type f -delete 2>/dev/null || true; echo "🔄 Periodic cleanup done"; done &) &&
             echo "Step 6: Starting Celery worker with $$CONCURRENCY workers..." &&
             celery -A multi_queue_worker worker --loglevel=info --queues=scan_high,scan_normal,discovery,maintenance --pool=prefork --concurrency=$$CONCURRENCY --max-tasks-per-child=10'
    healthcheck:
      test: ["CMD", "python", "-c", "from multi_queue_worker import health_check; print('Worker OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ADDED: Flower monitoring UI
  flower:
    build: .
    container_name: facebook-monitor-flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    depends_on:
      - redis
    env_file:
      - ./.env
    volumes:
      - ./targets.json:/app/targets.json:ro
    command: ["celery", "-A", "multi_queue_worker", "flower", "--port=5555"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5555/ || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 60s

  streamlit:
    build: .
    container_name: facebook-monitor-streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    depends_on:
      - api
    env_file:
      - ./.env
    volumes:
      - ./logs:/app/logs
      - ./targets.json:/app/targets.json
    command: ["streamlit", "run", "webapp_streamlit/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/ || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 90s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
